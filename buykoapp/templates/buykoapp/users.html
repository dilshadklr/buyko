{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Users</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .page-title {
            font-weight: 700;
            color: #001f4d;
        }

        .table th {
            background: #001f4d;
            color: white;
        }

        .status-active {
            color: green;
            font-weight: 700;
        }

        .status-offline {
            color: red;
            font-weight: 700;
        }

        .card {
            border-radius: 15px;
        }

        /* Search Bar */
        .search-input {
            border-radius: 30px;
            padding: 10px 20px;
            border: 2px solid #001f4d;
            width: 250px;
            transition: .3s;
        }
        .search-input:focus {
            border-color: #003580;
            outline: none;
            box-shadow: 0 0 8px rgba(0,53,128,0.4);
        }

        /* Responsive Table */
        @media (max-width: 768px) {
            .table th, .table td {
                font-size: 14px;
                padding: 6px;
            }

            .search-input {
                width: 100%;
                margin-bottom: 10px;
            }
        }

        @media (max-width: 480px) {
            .table th, .table td {
                font-size: 12px;
                padding: 4px;
            }
        }
    </style>
</head>

<body>

<div class="container py-4">

    <h2 class="page-title mb-4">Registered Users</h2>

    <!-- Search Bar -->
    <input 
        type="text" 
        id="userSearch" 
        class="search-input mb-3" 
        placeholder="Search User..."
        onkeyup="searchUser()"
    >

    <div class="card shadow-sm p-3">
        <div class="table-responsive">
            <table id="usersTable" class="table table-striped table-hover text-center align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Date Joined</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for u in users %}
                    <tr>
                        <td>{{ u.id }}</td>
                        <td>{{ u.username }}</td>
                        <td>{{ u.email }}</td>
                        <td>{{ u.date_joined|date:"d M Y, h:i A" }}</td>

                        <td>
                            {% if u.is_active_session %}
                                <span class="status-active">● Online</span>
                            {% else %}
                                <span class="status-offline">● Offline</span>
                            {% endif %}
                        </td>

                        <td>
                            <!-- Delete Button -->
                            <a href="{% url 'delete_user' u.id %}" 
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Are you sure you want to delete this user?');">
                                Delete
                            </a>
                        </td>

                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>
    </div>

</div>

<!-- Search Script -->
<script>
function searchUser() {
    let input = document.getElementById("userSearch").value.toLowerCase();
    let rows = document.querySelectorAll("#usersTable tbody tr");

    rows.forEach(row => {
        let name = row.cells[1].innerText.toLowerCase();
        let email = row.cells[2].innerText.toLowerCase();

        if (name.includes(input) || email.includes(input)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });
}
</script>

</body>
</html>
