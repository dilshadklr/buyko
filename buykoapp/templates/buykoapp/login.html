{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login | Buyko</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root{
            --brand-1:#001f4d;
            --brand-2:#003d99;
            --card-bg:#ffffff;
            --muted:#777;
        }

        *{box-sizing:border-box}
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-wrap {
            width: 100%;
            max-width: 460px;
            padding: 28px;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,255,255,0.96));
            box-shadow: 0 12px 40px rgba(0,0,0,0.28);
            text-align: center;
            margin: 24px;
        }

        .brand {
            margin-bottom: 16px;
        }
        .brand img {
            height: 64px;
            object-fit: contain;
        }

        h2 {
            margin: 12px 0 8px;
            font-size: 26px;
            color: var(--brand-1);
        }

        .lead {
            color: var(--muted);
            margin-bottom: 18px;
            font-size: 15px;
        }

        form { text-align: left; }

        .form-row { margin-bottom: 12px; }

        input[type="email"],
        input[type="password"],
        input[type="text"]{
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1.8px solid #e6e6e6;
            font-size: 15px;
            transition: box-shadow .18s, border-color .18s, transform .08s;
            background: #fff;
        }
        input:focus{
            outline: none;
            border-color: var(--brand-1);
            box-shadow: 0 6px 18px rgba(0,31,77,0.12);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 0;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, #011e3d, #001330);
            font-weight: 600;
            font-size: 16px;
            margin-top: 8px;
        }
        .btn-primary:hover { transform: translateY(-3px); }

        /* FORGET PASSWORD LINK */
        .forgot {
            display: block;
            margin-top: 6px;
            margin-bottom: 10px;
            font-size: 13px;
            text-align: right;
            color: #003d99;
            text-decoration: none;
            font-weight: 500;
        }
        .forgot:hover {
            text-decoration: underline;
        }

        .small {
            display: block;
            margin-top: 14px;
            text-align:center;
            color: var(--brand-1);
            font-weight:600;
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width:480px){
            .auth-wrap{ padding:18px }
            .brand img{ height:56px }
            h2{ font-size:22px }
        }
    </style>
</head>
<body>

  <div class="auth-wrap">

      <div class="brand">
          <img src="{% static 'logo1.png' %}" alt="Buyko logo">
      </div>

      <h2>Welcome back</h2>
      <p class="lead">Sign in to access your account and cart.</p>

      <form method="POST" novalidate>
          {% csrf_token %}

          <div class="form-row">
              <input type="email" name="email" placeholder="Email address" required />
          </div>

          <div class="form-row">
              <input type="password" name="password" placeholder="Password" required />
          </div>

          <!-- FORGET PASSWORD LINK -->
          <a href="{% url 'password_reset_request' %}" class="forgot">Forgot Password?</a>


          <button type="submit" class="btn-primary">Login</button>

          <a class="small" href="{% url 'register_user' %}">Create new account</a>

      </form>
  </div>

</body>
</html>
