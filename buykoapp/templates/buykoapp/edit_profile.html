{% extends "buykoapp/index.html" %}
{% load static %}
{% block content %}

<style>
/* Same design — just extended for new fields */
.user-title {
    font-size: 28px;
    font-weight: 800;
    color: #001f4d;
    letter-spacing: 1px;
}

.form-card {
    max-width: 700px;
    margin: auto;
    border-radius: 14px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    border: 1px solid #e6e6e6;
    background: #ffffff;
}

.form-card .card-body {
    padding: 30px;
}

.form-label {
    font-weight: 600;
    color: #001f4d;
}

.form-control {
    border-radius: 10px;
    border: 1px solid #c9d1e0;
    padding: 10px;
}

.form-actions {
    display: flex;
    gap: 12px;
    margin-top: 16px;
}

.btn-primary-custom {
    background: #001f4d;
    color: white;
    border-radius: 50px;
    padding: 10px 22px;
    font-weight: 600;
    font-size: 15px;
    border: none;
}

.btn-primary-custom:hover {
    background: #000f2a;
    transform: scale(1.05);
}

.btn-cancel {
    background: transparent;
    color: #001f4d;
    padding: 10px 22px;
    border-radius: 50px;
    border: 1px solid #001f4d;
    font-weight: 600;
}

.btn-cancel:hover {
    background: #001f4d;
    color: #fff !important;
    transform: scale(1.05);
}
</style>

<div class="container py-4">

    <h2 class="user-title"><i class="bi bi-pencil-square me-2"></i> Edit Profile</h2>

    <div class="card form-card mt-3">
        <div class="card-body">

            <form method="post" novalidate>
                {% csrf_token %}

                <!-- USER MODEL FIELDS -->
                <h5 class="mb-3 text-primary fw-bold">Account Details</h5>

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    {{ form.username }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    {{ form.email }}
                </div>
            
                <!-- USER PROFILE MODEL FIELDS -->
                <h5 class="mt-4 mb-3 text-primary fw-bold">Personal Information</h5>

                <div class="mb-3">
                    <label class="form-label">Mobile Number</label>
                    {{ profile_form.mobile }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Gender</label>
                    {{ profile_form.gender }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Full Address</label>
                    {{ profile_form.address }}
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary-custom">Save Changes</button>
                    <a href="{% url 'user_details' %}" class="btn-cancel">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
