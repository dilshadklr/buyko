{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify OTP — Buyko</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        font-family: Poppins, Arial, sans-serif;
        background: #f6f8fb;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        margin:0;
    }

    .card-box{
        width:390px;
        background:#fff;
        padding:30px;
        border-radius:16px;
        text-align:center;
        box-shadow:0 8px 30px rgba(19,38,68,0.08);
    }

    .logo{
        width:85px;
        margin-bottom:10px;
    }

    h2{
        color:#001f4d;
        margin-bottom:8px;
        font-weight:600;
    }

    p.lead{
        color:#58667a;
        font-size:14px;
        margin-bottom:18px;
    }

    /* OTP Input */
    input{
        width: 100%;
        height: 48px;
        padding: 12px 14px;
        margin-bottom: 14px;
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        font-size: 18px;
        text-align: center;
        letter-spacing: 6px;
        box-sizing: border-box;
    }

    input:focus{
        border-color:#001f4d;
        box-shadow:0 0 8px rgba(0,31,77,0.3);
        outline:none;
    }

    button{
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 0;
        background: #001f4d;
        color: white;
        font-weight: 600;
        font-size: 15px;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        background:#003080;
    }

    .note{
        font-size:13px;
        color:#5b6b80;
        margin-top:14px;
    }
</style>
</head>

<body>

<div class="card-box">

    <img src="{% static 'logo1.png' %}" class="logo">

    <h2>Verify OTP</h2>
    <p class="lead">Enter the 6-digit code sent to your email.</p>

    <form method="POST">
        {% csrf_token %}
        {{ form.otp }}
        <button type="submit">Verify OTP</button>
    </form>

    <p class="note">Didn’t receive it? Check spam folder.</p>

</div>

</body>
</html>
