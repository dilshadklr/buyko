{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Forgot Password — Buyko</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body{
      font-family: Inter, system-ui, Arial;
      background:#f6f8fb;
      margin:0;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
  }

  .card{
      width:380px;
      background:#fff;
      border-radius:16px;
      padding:32px 28px;
      box-shadow:0 8px 30px rgba(19,38,68,0.08);
      text-align:center;
  }

  .logo{
      width:90px;
      display:block;
      margin:0 auto 12px auto; /* centers logo */
  }

  h2{
      margin:0 0 10px;
      color:#001f4d;
      font-weight:600;
  }

  p.lead{
      color:#58667a;
      margin-bottom:20px;
      font-size:14px;
  }

  .field{
      width:100%;
      margin-bottom:14px;
  }

  input[type="email"]{
      width:100%;
      padding:13px 14px;
      border-radius:10px;
      border:1px solid #e2e8f0;
      font-size:14px;
      box-sizing:border-box;
  }

  input[type="email"]:focus{
      border-color:#001f4d;
      box-shadow:0 0 8px rgba(0,31,77,0.25);
      outline:none;
  }

  button{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:0;
      background:#001f4d;
      color:#fff;
      font-weight:600;
      cursor:pointer;
      font-size:15px;
      transition:.2s;
  }

  button:hover{
      background:#003080;
  }

  .note{
      margin-top:14px;
      font-size:13px;
      color:#5b6b80;
  }

</style>
</head>
<body>

  <div class="card">

    <!-- Centered Logo -->
    <img src="{% static 'logo1.png' %}" class="logo">

    <h2>Forgot Password</h2>
    <p class="lead">Enter your registered email to receive an OTP.</p>

    <form method="post" novalidate>
      {% csrf_token %}

      <div class="field">
        {{ form.email }}
      </div>

      <button type="submit">Send OTP</button>
    </form>

    <p class="note">Check your spam folder if email is not received.</p>
  </div>

</body>
</html>
