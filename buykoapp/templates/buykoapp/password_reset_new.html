{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create New Password — Buyko</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        font-family: Poppins, Arial, sans-serif;
        background:#f6f8fb;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        margin:0;
    }

    .box{
        width:390px;
        background:#fff;
        padding:35px 30px;
        border-radius:16px;
        box-shadow:0 8px 30px rgba(19,38,68,0.08);
        text-align:center;
    }

    .logo{
        width:85px;
        margin-bottom:10px;
    }

    h2{
        color:#001f4d;
        margin-bottom:12px;
        font-weight:600;
    }

    p.lead{
        color:#58667a;
        font-size:14px;
        margin-bottom:20px;
    }

    /* Input styling same as verify page */
    input{
        width:100%;
        padding:12px 14px;
        border-radius:12px;
        border:1px solid #e2e8f0;
        margin-bottom:14px;
        font-size:14px;
        box-sizing:border-box;
    }

    input:focus{
        border-color:#001f4d;
        box-shadow:0 0 8px rgba(0,31,77,0.3);
        outline:none;
    }

    button{
        width:100%;
        padding:12px;
        border-radius:12px;
        border:0;
        background:#001f4d;
        color:white;
        font-weight:600;
        font-size:15px;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        background:#003080;
    }

</style>
</head>

<body>

<div class="box">

    <img src="{% static 'logo1.png' %}" class="logo">

    <h2>Create New Password</h2>
    <p class="lead">Set a strong, secure password for your account.</p>

    <form method="POST">
        {% csrf_token %}

        <!-- Hidden fields -->
        {{ form.email }}
        {{ form.otp }}

        <!-- Visible fields -->
        {{ form.new_password }}
        {{ form.confirm_password }}

        <button type="submit">Reset Password</button>
    </form>

</div>

</body>
</html>
